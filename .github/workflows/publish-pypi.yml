name: Publish to PyPI

on:
  release:
    types: [published]

  workflow_dispatch:
    inputs:
      bump:
        description: "Version bump type"
        required: true
        type: choice
        options:
          - patch
          - minor
          - pre
        default: patch
      dry_run:
        description: "Dry run (skip PyPI publish)"
        required: false
        type: boolean
        default: false

permissions:
  contents: write
  id-token: write

jobs:
  bump-version:
    name: Bump Version
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    timeout-minutes: 5
    outputs:
      new_version: ${{ steps.bump.outputs.new_version }}
      tag: ${{ steps.bump.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Bump version
        id: bump
        run: |
          current=$(grep -oP 'version = "\K[^"]+' pyproject.toml)
          IFS='.' read -r major minor patch_raw <<< "$current"

          patch="${patch_raw%%a*}"
          pre="${patch_raw#*a}"

          case "${{ inputs.bump }}" in
            patch)
              new_version="${major}.${minor}.$((patch + 1))"
              ;;
            minor)
              new_version="${major}.$((minor + 1)).0"
              ;;
            pre)
              if [[ "$patch_raw" == *a* ]]; then
                new_version="${major}.${minor}.${patch}a$((pre + 1))"
              else
                new_version="${major}.${minor}.$((patch + 1))a0"
              fi
              ;;
          esac

          sed -i "s/version = \"${current}\"/version = \"${new_version}\"/" pyproject.toml
          echo "new_version=${new_version}" >> "$GITHUB_OUTPUT"
          echo "tag=v${new_version}" >> "$GITHUB_OUTPUT"
          echo "Bumped: ${current} → ${new_version}"

      - name: Commit and tag
        run: |
          git add pyproject.toml
          git commit -m "chore: bump version to ${{ steps.bump.outputs.new_version }}"
          git tag "${{ steps.bump.outputs.tag }}"
          git push origin main --tags

  build:
    name: Build Package
    runs-on: ubuntu-latest
    needs: [bump-version]
    if: always() && (needs.bump-version.result == 'success' || needs.bump-version.result == 'skipped')
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && 'main' || github.ref }}

      - uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync --frozen --extra dev

      - name: Run quality gates
        run: |
          uv run ruff check .
          uv run ruff format --check .
          uv run mypy src
          uv run pytest -ra

      - name: Build sdist and wheel
        run: uv run python -m build

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [bump-version, build]
    if: github.event_name == 'workflow_dispatch' && !inputs.dry_run
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ needs.bump-version.outputs.tag }}" \
            --title "${{ needs.bump-version.outputs.tag }}" \
            --generate-notes \
            --target main

  publish:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: [bump-version, build]
    if: |
      always() &&
      needs.build.result == 'success' &&
      (github.event_name == 'release' || (github.event_name == 'workflow_dispatch' && !inputs.dry_run))
    environment: pypi
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
