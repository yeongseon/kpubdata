name: 💡 기능 요청 (Feature Request)
description: 새로운 기능이나 개선 사항을 제안해 주세요
title: "[Feature] "
labels: ["type:feature"]
body:
  - type: markdown
    attributes:
      value: |
        ## 💡 기능 요청

        새로운 기능이나 기존 기능의 개선을 제안해 주세요.

        > 💡 새 Provider Adapter를 제안하려면 [New Provider Adapter](./new-provider-adapter.yml) 템플릿을 사용해 주세요.

  - type: textarea
    id: problem
    attributes:
      label: 어떤 문제를 해결하고 싶나요?
      description: 이 기능이 필요한 이유를 설명해 주세요. 현재 불편한 점이 무엇인가요?
      placeholder: "예: 매번 RecordBatch를 수동으로 pandas DataFrame으로 변환하는 것이 번거롭습니다"
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: 어떤 기능을 원하시나요?
      description: 원하는 기능을 구체적으로 설명해 주세요. 코드 예시가 있으면 더 좋습니다.
      placeholder: |
        result = ds.list(base_date="20250401", nx="55", ny="127")
        df = result.to_pandas()  # ← 이런 메서드가 있으면 좋겠습니다
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: 다른 방법은 생각해 보셨나요?
      description: 이 기능 대신 시도해 본 다른 방법이 있다면 적어주세요
      placeholder: "예: 지금은 수동으로 for 루프를 돌며 dict → DataFrame 변환하고 있습니다"
    validations:
      required: false

  - type: dropdown
    id: difficulty
    attributes:
      label: 예상 난이도
      description: 이 기능의 예상 구현 난이도를 선택해 주세요 (모르겠으면 비워두세요)
      options:
        - beginner (초급 — 파일 1~2개 수정)
        - intermediate (중급 — 여러 모듈 수정)
        - advanced (고급 — 설계 변경 필요)
    validations:
      required: false

  - type: checkboxes
    id: contribution
    attributes:
      label: 직접 구현하실 건가요?
      options:
        - label: "이 기능을 직접 구현해서 PR을 올릴 의향이 있습니다"
