name: 기능 제안
description: 새로운 기능이나 개선을 제안합니다 (신규 provider는 별도 템플릿 사용)
title: "[Feature] "
labels: ["type:feature"]
body:
  - type: markdown
    attributes:
      value: |
        > 새로운 공공데이터 provider adapter 제안은 **New Provider Adapter** 템플릿을 사용해주세요.
  - type: textarea
    id: problem
    attributes:
      label: 해결하려는 문제
      description: 어떤 불편이나 한계를 해결하려는 건가요?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: 제안 내용
      description: 원하는 동작이나 API를 설명하세요.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: 대안 검토
      description: 고려한 다른 방법이 있다면 적어주세요.
    validations:
      required: false
