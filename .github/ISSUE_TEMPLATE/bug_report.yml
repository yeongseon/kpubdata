name: 버그 리포트
description: 예상과 다르게 동작하는 문제를 신고합니다
title: "[Bug] "
labels: ["type:bug"]
body:
  - type: markdown
    attributes:
      value: |
        버그를 신고해 주셔서 감사합니다. 재현에 필요한 정보를 최대한 채워주세요.
  - type: textarea
    id: summary
    attributes:
      label: 문제 요약
      description: 무엇이 잘못되었나요?
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: 재현 절차
      description: 문제를 재현하는 최소 코드 예시 또는 단계별 절차
      placeholder: |
        ```python
        from kpubdata import Client
        client = Client.from_env()
        ...
        ```
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: 기대 동작
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: 실제 동작 / 오류 로그(traceback)
      render: shell
    validations:
      required: true
  - type: input
    id: provider
    attributes:
      label: 관련 provider (해당 시)
      placeholder: "예) datago, kosis, seoul"
    validations:
      required: false
  - type: textarea
    id: environment
    attributes:
      label: 실행 환경
      description: OS, Python 버전, kpubdata 버전
      placeholder: |
        - OS: Ubuntu 24.04
        - Python: 3.12
        - kpubdata: x.y.z
    validations:
      required: false
