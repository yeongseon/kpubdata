name: 🐛 버그 리포트 (Bug Report)
description: 코드가 예상과 다르게 동작하는 문제를 알려주세요
title: "[Bug] "
labels: ["type:bug"]
body:
  - type: markdown
    attributes:
      value: |
        ## 🐛 버그 리포트

        코드가 예상과 다르게 동작하나요? 아래 양식을 작성해 주세요.
        가능한 자세히 적을수록 문제를 빨리 해결할 수 있습니다.

        > 💡 처음 이슈를 작성하시나요? [CONTRIBUTING.md](../../CONTRIBUTING.md)를 먼저 읽어보세요.

  - type: textarea
    id: description
    attributes:
      label: 어떤 문제인가요?
      description: 문제를 한두 문장으로 설명해 주세요
      placeholder: "예: client.dataset('datago.village_fcst')를 호출하면 KeyError가 발생합니다"
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: 예상한 동작
      description: 원래 어떻게 동작해야 한다고 생각하셨나요?
      placeholder: "예: 동네예보 데이터셋 객체가 반환되어야 합니다"
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: 실제 동작
      description: 실제로는 어떻게 동작했나요? 에러 메시지가 있다면 전체를 붙여넣어 주세요
      placeholder: |
        Traceback (most recent call last):
          File "...", line N, in <module>
            ...
        KeyError: 'village_fcst'
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: 재현 방법
      description: 이 문제를 다시 만들어보려면 어떤 순서로 해야 하나요?
      placeholder: |
        1. `pip install kpubdata` 로 설치
        2. `Client.from_env()` 로 클라이언트 생성
        3. `client.dataset("datago.village_fcst")` 호출
        4. KeyError 발생
    validations:
      required: true

  - type: input
    id: python-version
    attributes:
      label: Python 버전
      description: "`python --version` 결과를 적어주세요"
      placeholder: "3.10.12"
    validations:
      required: true

  - type: input
    id: kpubdata-version
    attributes:
      label: KPubData 버전
      description: "`pip show kpubdata` 결과의 Version 값을 적어주세요"
      placeholder: "0.1.0"
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: 운영체제
      options:
        - macOS
        - Windows
        - Linux (Ubuntu)
        - Linux (기타)
        - 기타
    validations:
      required: true

  - type: textarea
    id: additional
    attributes:
      label: 추가 정보
      description: 스크린샷, 로그 파일 등 도움이 될 정보가 있다면 추가해 주세요
    validations:
      required: false
